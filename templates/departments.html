<!DOCTYPE html>
<html>
<head>
<title>Departments</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar">

<div class="logo">UCMS</div>

<div class="nav-links">
<a href="/">Home</a>
<a href="/departments">Departments</a>
<a href="/add_department">Add Department</a>
</div>

</nav>

<div class="page-container">

<h2>Departments</h2>

<table class="course-table">

<tr>
<th>ID</th>
<th>Name</th>
<th>Building</th>
<th>Email</th>
</tr>

{% for d in departments %}
<tr>
<td>{{d[0]}}</td>
<td>{{d[1]}}</td>
<td>{{d[2]}}</td>
<td>{{d[3]}}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
