<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
<title>Courses</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar">

<div class="logo">UCMS</div>

<div class="nav-links">
<a href="/">Home</a>
<a href="/courses">Courses</a>
<a href="/add_course">Add Course</a>
<a href="/programs">Programs</a>
<a href="/departments">Departments</a>
<a href="/instructors">Instructors</a>
</div>

</nav>

<div class="page-container">

<h2>Course List</h2>

<table class="course-table">

<tr>
<th>ID</th>
<th>Name</th>
<th>Credits</th>
<th>Semester</th>
<th>Program</th>
<th>Department</th>
<th>Instructor</th>
</tr>

{% for c in courses %}
<tr>
<td>{{c[0]}}</td>
<td>{{c[1]}}</td>
<td>{{c[2]}}</td>
<td>{{c[3]}}</td>
<td>{{c[4]}}</td>
<td>{{c[5]}}</td>
<td>{{c[6]}}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
